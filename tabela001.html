<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        body {
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        table {
            width: 400px;
            height: 400px;
            border-collapse: collapse;
           
        }
         
        td {
            background-color: chartreuse;
            border: 1px solid black; 
            padding: 8px;
            text-align: center;
            vertical-align:middle;
           
        }
        td.preto {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela </h1>
    <table>
        <tr>
            <td>SKOL</td>
            <td class="preto">BRAHMA</td>
            <td>ANTARCTICA</td>
        </tr>
        <tr>
            <td class="preto">CRISTAL</td>
            <td>ITAIPAVA</td>
            <td class="preto">SOL</td>
        </tr>
        <tr>
            <td>COCA COLA</td>
            <td class="preto">FANTA</td>
            <td>KITUBAINA</td>
        </tr>
        <tr>
            <td class="preto">G. ANTARTICA</td>
            <td>G.MARAJA</td>
            <td class="preto">ICE COLA</td>
        </tr>
    </table>
    
</body>
</html>
